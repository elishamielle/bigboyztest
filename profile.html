<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="images/favicon.png">
        <title>Big Boyz Diner - Profile</title>
        <link rel="stylesheet" href="style14.css">
        <link href="https://fonts.googleapis.com/css2?family=Boogaloo&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500&display=swap" rel="stylesheet">
    </head>
    
 <body>  
        <nav class="navbar">  
            <ul class="nav-links">  
                
                <li class="logo-item">
                    <img src="images/mainlogo.png" alt="Big Boyz Diner">
                </li>  

                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>  
                <li class="dropdown">
                    <a href="#" class="main-link">MENU</a>
                    <div class="dropdown-content">
                        <a href="#">MENU</a> 
                        <a href="dlsumenu.html">DLSU LAG.</a>
                        <a href="ltimenu.html">LTI</a>
                    </div>
                </li> 
                <li><a href="branches.html">BRANCHES</a></li>  
                <li><a href="#contact-us">CONTACT US</a></li>  

                <li class="right-menu">
                    <a href="mycart.html" class="icon-link"><img src="images/cart.png" alt="Cart" class="nav-icon"></a>
                    
                    <a href="login.html" id="nav-user-link" class="icon-link">
                        <img src="images/user.png" alt="User" class="nav-icon">
                    </a>
                    
                    <a href="login.html" class="login-link" id="nav-auth-text">Log-in/Sign-up</a>
                </li>

            </ul>  
        </nav> 

        <section class="cart-section">
            <div class="cart-container">
                <div class="cart-header">
                    <img src="images/user.png" alt="Profile" class="cart-header-icon">
                    <h1 class="cart-title" id="profile-name">LOADING...</h1>
                </div>

                <div class="profile-body">
                    <div class="profile-actions">
                        <button class="profile-btn"onclick="window.location.href='orders.html'" >MY ORDERS</button>
                        <button class="profile-btn" onclick="window.location.href='mycart.html'">MY CART</button>
                    </div>

                    <div class="profile-info">
                        <h2 class="info-title">ACCOUNT INFORMATION</h2>
                        <div class="info-row">
                            <span class="info-label">EMAIL</span>
                            <span class="info-value" id="profile-email">loading...</span>
                        </div>
                    </div>
                </div>

                <div class="profile-footer">
                    <button class="profile-logout-btn">Logout</button>
                </div>
            </div>
        </section>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const menuLink = document.getElementById('footerMenuLink');
                const dropdownContent = document.getElementById('footerDropdownContent');
                if (menuLink && dropdownContent) {
                    menuLink.addEventListener('click', function(e) {
                        e.preventDefault();
                        dropdownContent.classList.toggle('show');
                    });
                }
            });
        </script>

        </script>
        <script src="auth.js"></script>
    </body>
</html>
