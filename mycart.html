        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500&display=swap" rel="stylesheet">

    </head>
    
    <body>  
        <nav class="navbar">  
            <ul class="nav-links">  
                
                <li class="logo-item">
                    <img src="images/mainlogo.png" alt="Big Boyz Diner">
                </li>  

                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>  
                <li class="dropdown">
                    <a href="#" class="main-link">MENU</a>
                    <div class="dropdown-content">
                        <a href="#">MENU</a> 
                        <a href="dlsumenu.html">DLSU LAG.</a>
                        <a href="ltimenu.html">LTI</a>
                    </div>
                </li> 
                <li><a href="branches.html">BRANCHES</a></li>  
                <li><a href="#">CONTACT US</a></li>  

                <li class="right-menu">
                    <a href="#" class="icon-link"><img src="images/cart.png" alt="Cart" class="nav-icon"></a>
                    <a href="#" class="icon-link"><img src="images/user.png" alt="User" class="nav-icon"></a>
                    <a href="#" class="login-link">Log-in/Sign-up</a>
                </li>

            </ul>  
        </nav> 

        <section class="cart-section">
            <div class="cart-container">
                
                <div class="cart-header">
                    <img src="images/addcart.png" alt="Cart" class="cart-header-icon">
                    <h1 class="cart-title">MY CART</h1>
                </div>

                <div class="cart-items">
                    
                    <div class="cart-row">
                        <div class="cart-item-card">
                            
                            <div class="cart-item-left">
                                <img src="images/wings.png" alt="Chicken Wings" class="cart-item-img">
                                <div class="cart-item-details">
                                    <h3 class="cart-item-title">CHICKEN WINGS (1)</h3>
                                    <div class="cart-item-controls">
                                        <span class="cart-qty-label">QTY</span>
                                        <button class="cart-qty-btn">-</button>
                                        <span class="cart-qty-num">1</span>
                                        <button class="cart-qty-btn">+</button>
                                        <span class="cart-flavor-tag">MIXED</span>
                                    </div>
                                </div>
                            </div>

                            <div class="cart-item-right">
                                <span class="cart-item-total-label">TOTAL</span>
                                <span class="cart-item-price">P 139.00</span>
                            </div>

                        </div>
                        
                        <button class="cart-delete-btn">
                            <img src="images/trash.png" alt="Remove Item">
                        </button>
                    </div>
                    </div>

                <div class="cart-summary">
                    <div class="summary-text">
                        <span class="summary-total-label">TOTAL</span>
                        <span class="summary-total-price">P 139.00</span>
                    </div>
                    <button class="checkout-btn">CHECKOUT</button>
                </div>

            </div>
        </section>


    <section style="height:150px;"></section>

        <div class="top-bar">
            <div class="top-content">
                <img src="images/mainlogo.png" alt="Big Boyz Logo" class="top-logo">

                <div class="contact-item">
                    <img src="images/phone-154.png" alt="Phone" class="contact-icon">
                    <span>09296003877</span>
                </div>

                <div class="contact-item">
                    <img src="images/letter-151.png" alt="Email" class="contact-icon">
                    <span>bigboyzdiner@gmail.com</span>
                </div>

                <div class="contact-item">
                    <img src="images/facebook-148.png" alt="Facebook" class="contact-icon">
                    <span>BIG BOYZ DINER</span>
                </div>

                <div class="contact-item">
                    <img src="images/viber-157.png" alt="Viber" class="contact-icon">
                    <span>Bigboyz</span>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-col">
                    <h3>EST. 2023</h3>
                </div>
                <div class="footer-col">
                    <h3>Home</h3>
                    <a href="#">About</a>
                    <a href="#">Menu</a>
                </div>
                <div class="footer-col">
                    <h3>Branches</h3>
                    <a href="#">DLSU Laguna</a>
                    <a href="#">LTI Square Binan</a>
                </div>
            </div>
        </footer>

        

    </body>
