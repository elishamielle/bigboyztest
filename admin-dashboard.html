<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Big Boyz</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=BenchNine:wght@400;700&family=Passion+One:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Hides the whole body by default */
        body { display: none; }
    </style>
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        
        <aside class="admin-sidebar">
            <img src="../images/mainlogo.png" alt="Big Boyz" class="sidebar-logo">
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html" class="active">Overview & Sales</a></li>
                <li><a href="admin-pending.html">Pending Orders</a></li>
                <li><a href="admin-completed.html">Completed Orders</a></li>
            </ul>
            <button class="logout-btn">LOG OUT</button>
        </aside>

        <main class="admin-main">
            
            <header class="main-header">
                <h1>DASHBOARD OVERVIEW</h1>
                <p>Welcome back, Admin. Here is what is happening today.</p>
            </header>

            <section class="sales-summary-grid">
                <div class="sales-card" >
                    <h3>TODAY'S SALES</h3>
                    <p class="sales-number" id="sales_today"></p>
                </div>
                <div class="sales-card">
                    <h3>THIS WEEK</h3>
                    <p class="sales-number" id="sales_week"></p>
                </div>
                <div class="sales-card">
                    <h3>THIS MONTH</h3>
                    <p class="sales-number" id="sales_month"></p>
                </div>
            </section>

            <section class="live-orders-section">
                <h2>INCOMING ORDERS (ACTION REQUIRED)</h2>
                
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Time</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="dashboard_orders_body">
                    </tbody>
                </table>
            </section>

        </main>
    </div>
    <script src="admin_guard.js"></script>
    <script src="popup.js"></script>
    <script src="admin_orders.js"></script>

</body>
</html>
