<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completed Orders - Big Boyz Admin</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=BenchNine:wght@400;700&family=Passion+One:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        
        <aside class="admin-sidebar">
            <img src="../images/mainlogo.png" alt="Big Boyz" class="sidebar-logo">
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html">Overview & Sales</a></li>
                <li><a href="admin-pending.html">Pending Orders</a></li>
                <li><a href="admin-completed.html" class="active">Completed Orders</a></li>
            </ul>
            <button class="logout-btn">LOG OUT</button>
        </aside>

        <main class="admin-main">
            
            <header class="main-header">
                <h1>COMPLETED ORDERS</h1>
                <p>History of fulfilled and served orders.</p>
            </header>

            <section class="live-orders-section">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Time Finished</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="completed_orders_body">
                    </tbody>
                </table>
                <div class="orders-summary">
                    <span class="summary-label">Total Completed Orders:</span>
                    <span class="summary-count" id="totalCompletedCount">0</span>
                </div>
            </section>

        </main>
    </div>

    <script>
    
        function toggleDetails(orderId) {
            const detailsRow = document.getElementById(orderId);
            if (detailsRow.classList.contains('open')) {
                detailsRow.classList.remove('open');
            } else {
                detailsRow.classList.add('open');
            }
        }

        const totalRows = document.querySelectorAll('.order-main-row').length;
        
        document.getElementById('totalCompletedCount').innerText = totalRows;
    
    </script>

    <script src="admin_guard.js"></script>
    <script src="popup.js"></script>
    <script src="admin_orders.js"></script>

</body>
</html>
