        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const menuLink = document.getElementById('footerMenuLink');
                const dropdownContent = document.getElementById('footerDropdownContent');

                if (menuLink && dropdownContent) {
                    menuLink.addEventListener('click', function(event) {
                        event.preventDefault();
                        event.stopPropagation();
                        dropdownContent.classList.toggle('show');
                    });

                    document.addEventListener('click', function(event) {
                        if (!dropdownContent.contains(event.target) && event.target !== menuLink) {
                            dropdownContent.classList.remove('show');
                        }
                    });
                }
            });
        </script>
