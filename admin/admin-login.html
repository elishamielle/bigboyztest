<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Big Boyz</title>
    <link rel="stylesheet" href="login.css"> 
    <link href="https://fonts.googleapis.com/css2?family=BenchNine:wght@400;700&family=Passion+One:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-container">
        <img src="../images/mainlogo.png" alt="Big Boyz Logo" class="admin-logo">
        
        <h1 class="admin-title">ADMINISTRATOR P0RTAL</h1>
        
        <form class="admin-login-form">
            <div class="input-group">
                <label for="admin-user">USERNAME</label>
                <input type="text" id="admin-user" placeholder="Enter Admin ID" required>
            </div>
            
            <div class="input-group">
                <label for="admin-pass">PASSWORD</label>
                <input type="password" id="admin-pass" placeholder="Enter Password" required>
            </div>
            
            <button type="button" class="admin-login-btn">SECURE LOG-IN</button>
        </form>
    </div>

</body>
</html>
